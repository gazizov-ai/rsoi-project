apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rsoi-service.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "rsoi-service.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "rsoi-service.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "rsoi-service.name" . }}
    spec:
      containers:
        - name: {{ include "rsoi-service.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
          {{- if or .Values.env .Values.secretEnv }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $key, $value := .Values.secretEnv }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "rsoi-service.fullname" $ }}-secret
                  key: {{ $key }}
            {{- end }}
          {{- end }}
          {{- if .Values.probes.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
