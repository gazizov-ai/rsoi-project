name: Build Project

on:
  push:
    branches: [ master ]
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run unit tests
        run: |
          (cd common && go test ./...)
          (cd identity && go test ./...)
          (cd reservation && go test ./...)
          (cd payment && go test ./...)
          (cd loyalty && go test ./...)
          (cd statistics && go test ./...)
          (cd gateway && go test ./...)

      - uses: docker/setup-buildx-action@v3

      - name: Build images for pull request
        if: github.event_name == 'pull_request'
        run: docker compose build

      - name: Install yc
        if: github.event_name == 'push'
        run: |
          curl https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Configure yc auth
        if: github.event_name == 'push'
        env:
          YC_SERVICE_ACCOUNT_KEY: ${{ secrets.YC_SERVICE_ACCOUNT_KEY }}
          YC_FOLDER_ID: ${{ vars.YC_FOLDER_ID }}
        run: |
          echo "$YC_SERVICE_ACCOUNT_KEY" > key.json
          yc config set service-account-key key.json
          yc config set folder-id "$YC_FOLDER_ID"

      - name: Login to Yandex Container Registry
        if: github.event_name == 'push'
        run: yc iam create-token | docker login --username iam --password-stdin cr.yandex

      - name: Build images and push
        if: github.event_name == 'push'
        env:
          IMAGE_PREFIX: ${{ vars.IMAGE_PREFIX }}
        run: |
          docker buildx build -f gateway/Dockerfile -t $IMAGE_PREFIX/rsoi-gateway:${GITHUB_SHA} -t $IMAGE_PREFIX/rsoi-gateway:latest --push .
          docker buildx build -f identity/Dockerfile -t $IMAGE_PREFIX/rsoi-identity:${GITHUB_SHA} -t $IMAGE_PREFIX/rsoi-identity:latest --push .
          docker buildx build -f reservation/Dockerfile -t $IMAGE_PREFIX/rsoi-reservation:${GITHUB_SHA} -t $IMAGE_PREFIX/rsoi-reservation:latest --push .
          docker buildx build -f payment/Dockerfile -t $IMAGE_PREFIX/rsoi-payment:${GITHUB_SHA} -t $IMAGE_PREFIX/rsoi-payment:latest --push .
          docker buildx build -f loyalty/Dockerfile -t $IMAGE_PREFIX/rsoi-loyalty:${GITHUB_SHA} -t $IMAGE_PREFIX/rsoi-loyalty:latest --push .
          docker buildx build -f statistics/Dockerfile -t $IMAGE_PREFIX/rsoi-statistics:${GITHUB_SHA} -t $IMAGE_PREFIX/rsoi-statistics:latest --push .
          docker buildx build -f ui/Dockerfile -t $IMAGE_PREFIX/rsoi-ui:${GITHUB_SHA} -t $IMAGE_PREFIX/rsoi-ui:latest --push .

      - name: Install kubectl
        if: github.event_name == 'push'
        uses: azure/setup-kubectl@v4
        with:
          version: v1.33.0

      - name: Install Helm
        if: github.event_name == 'push'
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Configure kubeconfig
        if: github.event_name == 'push'
        env:
          YC_FOLDER_ID: ${{ vars.YC_FOLDER_ID }}
          YC_K8S_CLUSTER_NAME: ${{ vars.YC_K8S_CLUSTER_NAME }}
        run: |
          yc managed-kubernetes cluster get-credentials "$YC_K8S_CLUSTER_NAME" --folder-id "$YC_FOLDER_ID" --external --force
          kubectl get nodes

      - name: Deploy services to Kubernetes
        if: github.event_name == 'push'
        env:
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          DEFAULT_USER_USERNAME: ${{ secrets.DEFAULT_USER_USERNAME }}
          DEFAULT_USER_PASSWORD: ${{ secrets.DEFAULT_USER_PASSWORD }}
          DEFAULT_USER_EMAIL: ${{ secrets.DEFAULT_USER_EMAIL }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          IMAGE_PREFIX: ${{ vars.IMAGE_PREFIX }}
          NAMESPACE: ${{ vars.K8S_NAMESPACE }}
          CLIENT_ID: ${{ vars.CLIENT_ID }}
          KAFKA_BROKERS: ${{ vars.KAFKA_BROKERS }}
          KAFKA_TOPIC: ${{ vars.KAFKA_TOPIC }}
          LETSENCRYPT_EMAIL: ${{ vars.LETSENCRYPT_EMAIL }}
        run: bash .github/ci/deploy.sh

      - name: Install Newman
        if: github.event_name == 'push'
        run: npm install -g newman

      - name: Prepare Postman environment
        if: github.event_name == 'push'
        env:
          DEFAULT_USER_USERNAME: ${{ secrets.DEFAULT_USER_USERNAME }}
          DEFAULT_USER_PASSWORD: ${{ secrets.DEFAULT_USER_PASSWORD }}
          CLIENT_ID: ${{ vars.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        run: |
          cat > postman-environment.json <<EOF
          {
            "id": "f5b86109-6550-40f9-9c68-5ae68668f721",
            "name": "rsoi-deploy",
            "values": [
              { "key": "serviceUrl", "value": "https://$API_HOST", "enabled": true },
              { "key": "identityProviderUrl", "value": "https://$IDENTITY_HOST", "enabled": true },
              { "key": "username", "value": "$DEFAULT_USER_USERNAME", "enabled": true },
              { "key": "password", "value": "$DEFAULT_USER_PASSWORD", "enabled": true },
              { "key": "clientId", "value": "$CLIENT_ID", "enabled": true },
              { "key": "clientSecret", "value": "$CLIENT_SECRET", "enabled": true },
              { "key": "dateOffset", "value": "30", "enabled": true }
            ],
            "_postman_variable_scope": "environment"
          }
          EOF

      - name: Run API tests
        if: github.event_name == 'push'
        env:
          NAMESPACE: ${{ vars.K8S_NAMESPACE }}
        run: bash .github/ci/smoke.sh

      - name: Cleanup smoke test data
        if: always() && github.event_name == 'push'
        continue-on-error: true
        run: |
          newman run test-collections/end2end.json \
            -e postman-environment.json \
            --folder Cleanup
