services:
  postgres:
    image: library/postgres:15
    restart: on-failure
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./postgres/:/docker-entrypoint-initdb.d/
    ports:
      - "15432:5432"

  identity:
    build:
      context: .
      dockerfile: identity/Dockerfile
    environment:
      PORT: 8084
      DB_URL: postgres://postgres:postgres@postgres:5432/identity?sslmode=disable
      ISSUER: http://localhost:8084
      DEFAULT_REDIRECT_URI: http://localhost:8080/api/v1/callback
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      ADMIN_EMAIL: admin@example.com
    ports:
      - "8084:8084"
    depends_on:
      - postgres
    restart: on-failure

  reservation:
    build:
      context: .
      dockerfile: reservation/Dockerfile
    environment:
      PORT: 8070
      DB_URL: postgres://postgres:postgres@postgres:5432/reservations?sslmode=disable
      IDENTITY_URL: http://identity:8084
      JWT_ISSUER: http://localhost:8084
    ports:
      - "8070:8070"
    depends_on:
      - postgres
      - identity
    restart: on-failure

  payment:
    build:
      context: .
      dockerfile: payment/Dockerfile
    environment:
      PORT: 8060
      DB_URL: postgres://postgres:postgres@postgres:5432/payments?sslmode=disable
      IDENTITY_URL: http://identity:8084
      JWT_ISSUER: http://localhost:8084
      KAFKA_BROKERS: kafka:29092
      KAFKA_PAYMENT_CANCEL_TOPIC: payment.cancel.requested
      KAFKA_GROUP_ID: payment
    ports:
      - "8060:8060"
    depends_on:
      - postgres
      - identity
      - kafka
    restart: on-failure

  loyalty:
    build:
      context: .
      dockerfile: loyalty/Dockerfile
    environment:
      PORT: 8050
      DB_URL: postgres://postgres:postgres@postgres:5432/loyalties?sslmode=disable
      IDENTITY_URL: http://identity:8084
      JWT_ISSUER: http://localhost:8084
      KAFKA_BROKERS: kafka:29092
      KAFKA_RESERVATION_CANCELED_TOPIC: reservation.canceled
      KAFKA_RESERVATION_CREATED_TOPIC: reservation.created
      KAFKA_GROUP_ID: loyalty
    ports:
      - "8050:8050"
    depends_on:
      - postgres
      - identity
      - kafka
    restart: on-failure

  statistics:
    build:
      context: .
      dockerfile: statistics/Dockerfile
    environment:
      PORT: 8040
      DB_URL: postgres://postgres:postgres@postgres:5432/statistics?sslmode=disable
      IDENTITY_URL: http://identity:8084
      JWT_ISSUER: http://localhost:8084
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC: rsoi.events
      KAFKA_RESERVATION_CANCELED_TOPIC: reservation.canceled
      KAFKA_RESERVATION_CREATED_TOPIC: reservation.created
      KAFKA_PAYMENT_CANCEL_TOPIC: payment.cancel.requested
      KAFKA_GROUP_ID: statistics
    ports:
      - "8040:8040"
    depends_on:
      - postgres
      - identity
      - kafka
    restart: on-failure

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      PORT: 8080
      RESERVATION_URL: http://reservation:8070
      PAYMENT_URL: http://payment:8060
      LOYALTY_URL: http://loyalty:8050
      IDENTITY_URL: http://identity:8084
      IDENTITY_PUBLIC_URL: http://localhost:8084
      STATISTICS_URL: http://statistics:8040
      JWT_ISSUER: http://localhost:8084
      CLIENT_ID: rsoi-spa
      REDIRECT_URI: http://localhost:8080/api/v1/callback
      UI_URL: http://localhost:3001
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC: rsoi.events
    ports:
      - "8080:8080"
    depends_on:
      - reservation
      - payment
      - loyalty
      - identity
      - statistics
      - kafka
    restart: on-failure

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    ports:
      - "3001:80"
    depends_on:
      - gateway
    restart: on-failure

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.2
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "22181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.3.2
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper

volumes:
  db-data:
